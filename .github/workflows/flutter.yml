name: Flutter CI

on:
  push:
    paths:
      - 'app/**'
  pull_request:
    paths:
      - 'app/**'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Install dependencies
        run: flutter pub get
        working-directory: app
      - name: Analyze
        run: flutter analyze
        working-directory: app
      - name: Test
        run: flutter test
        working-directory: app
