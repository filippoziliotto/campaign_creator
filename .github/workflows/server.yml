name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - 'scripts/**'
      - '.env.example'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'scripts/**'
      - '.env.example'
      - '.github/workflows/server.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r server/requirements.txt
      - name: Compile check
        run: |
          python -m py_compile server/api/app.py
          python -m py_compile server/story_selector/prompt_builder.py
          python -m py_compile server/story_selector/render.py
          python -m py_compile server/story_selector/schema.py
      - name: Import smoke test
        run: python -c "from server import CampaignRequest, load_options, render_prompt; print('imports OK')"
