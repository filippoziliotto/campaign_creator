twists:
  - Brak zwrotu akcji
  - Przepowiednia jest fałszywa
  - Zaufany sojusznik okazuje się zdrajcą
  - Antagonista próbuje zapobiec jeszcze gorszej katastrofie
  - Drużynę łączy zapomniane pochodzenie
  - Główny artefakt jest świadomy i manipulujący
  - Loch jest żywym organizmem
  - Cel misji nie chce zostać uratowany
  - Zaginiona osoba upozorowała własne zniknięcie
  - Prawdziwym zagrożeniem jest życzliwa instytucja (kościół, gildia, akademia)
  - Świat utknął w subtelnej pętli czasu
  - BG już nie żyją i o tym nie wiedzą
  - Złoczyńca już wygrał, a misja polega na ograniczaniu strat
  - Drużyna nieświadomie służy złoczyńcy
  - Potwory uciekają przed drapieżnikiem o skali kataklizmu
  - Cały region jest magiczną symulacją albo snem śpiącego boga
  - Lekarstwo na plagę wymaga poświęcenia osoby, która je zleciła
  - Wroga frakcja składa się z przyszłych ocalałych po porażce drużyny
  - Apokalipsa już się wydarzyła; świat żyje wewnątrz zaklęcia naprawy
  - Przepowiednia jest trafna, ale dotyczy złoczyńców, nie bohaterów
  - Śmierć zaginęła, a ktoś inny wykonuje jej pracę fatalnie
  - Bóg kłamie o tym, czego chce
  - Więzienie zbudowano po to, by coś nie mogło się dostać do środka
  - Wspomnienia drużyny zostały zmienione z jakiegoś powodu
  - Patron nie żyje od dawna, jeszcze sprzed początku misji

