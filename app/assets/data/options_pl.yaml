preset_descriptions:

  # ── ONE-SHOT ─────────────────────────────────────────────────────────────────

  NULLA NELLE TORRI: |
    One-Shot · Eberron · Noir
    Skradziony artefakt rozdziera szczelinę do pustki i coś przez nią przechodzi.
    Wyścig z czasem w mieście, które jeszcze nie wie, że jest już skazane.
    Drużyna pracuje dla kogoś. Zbyt późno odkrywa, dla kogo naprawdę.

  SPECCHI SENZA VITA: |
    One-Shot · Ravenloft · Horror
    Klątwa przechodzi od drzwi do drzwi. Drużyna jest już zarażona.
    Napięte śledztwo z tykającym zegarem i bez prostych odpowiedzi.
    Zwrot akcji nie przychodzi z zewnątrz, tylko ze zwierciadła.

  ORDINI SPEZZATI: |
    One-Shot · Wildemount · Wojna
    Rozkaz do wykonania. Sojusznik, który uśmiecha się zbyt szeroko.
    Infiltracja w strefie wojny, gdzie frakcje zderzają się ze sobą.
    Frenetyczne tempo, moralna szarość i finał, który zostaje z tobą długo.

  CENERI SENZA SPERANZA: |
    One-Shot · Dark Sun · Przetrwanie
    Złoczyńca już wygrał. Drużyna dociera tylko do ruin.
    Wyścig z czasem w spalonym świecie, bez zbawców.
    Przeżyć to za mało. Trzeba jeszcze wybrać, co warto ocalić.

  FIERA SOTTO PRESSIONE: |
    One-Shot · Ravnica · Intryga
    Trzydzieści minut, by powstrzymać coś pośród zatłoczonego jarmarku.
    Trzech podejrzanych, tysiąc cywilów i zero dostępnych władz.
    Cel nie chce zostać uratowany. Ma ku temu własne, dobre powody.

  FUNERALE SBAGLIATO: |
    One-Shot · Forgotten Realms · Tajemnica
    Zły pogrzeb. Ciało, które nie należy do zmarłego.
    Ten, kto podmienił zwłoki, już wie, że drużyna tu jest.
    Czarny charakter nie jest tym, na kogo wygląda i ma rację.

  OMBRA NELLA CACCIA: |
    One-Shot · Homebrew · Łowy
    Polowanie miało być proste. Stwór nie był tym, za co go brano.
    Coś znacznie większego pchało go prosto na drużynę.
    Ostatni wybór: walczyć z zagrożeniem albo podążyć za nim do źródła.

  ECO DAL FUTURO: |
    One-Shot · Exandria · Pętla
    Otwiera się portal. Wychodzi z niego sama drużyna.
    Przyszłe wersje bohaterów, niemożliwe ostrzeżenia i wróg, który wie wszystko.
    Krąg zamknie się tylko wtedy, gdy zrozumiesz, gdzie naprawdę się zaczął.

  LOCANDA AL CREPUSCOLO: |
    One-Shot · Feywild · Baśń
    Ostatnia gospoda przed granicą. Jeden gość nie zamierza wyjechać.
    Klaustrofobiczny horror z odkrywaniem prawdy pokój po pokoju.
    Artefakt nie jest bronią, tylko kimś, kto pamięta.

  ROTTE STELLARI: |
    One-Shot · Spelljammer · Kosmos
    Statek, nieprawdopodobna załoga i niemożliwa dostawa.
    Cel nie chce zostać odnaleziony i ma ku temu własne, bardzo dobre powody.
    Ironiczny ton, duża prędkość i gwarantowany kosmiczny chaos.

  # ── MINI-KAMPANIA ────────────────────────────────────────────────────────────

  CICATRICI DI FERRO: |
    Mini-kampania · Wildemount · Wojna
    Wojna skończyła się dwa lata temu. Blizny wcale się nie zamknęły.
    Drużyna podąża tropem zemst, które wyrastają z rozkazów nigdy oficjalnie niewydanych.
    Każda sesja odsłania nową warstwę tego, kto kłamał i dlaczego.

  MARE CHE SCOMPARE: |
    Mini-kampania · Homebrew · Ocean
    Nadmiasteczko znika z map co trzydzieści lat. Właśnie nadeszła ta pora.
    Drużyna ma zaledwie kilka sesji, by zrozumieć zjawisko i zdecydować, czy w ogóle warto je zatrzymać.
    Lokalny folklor, mała polityka i kosmologiczne objawienie w finale.

  ARCHIVI IN FIAMME: |
    Mini-kampania · Eberron · Intryga
    Ktoś podpala magiczne archiwa w trzech miastach, zawsze w tej samej kolejności.
    Ślady prowadzą do prawdy, którą gildia chce pogrzebać na zawsze.
    Akademicka intryga, pościgi i sojusznicy, którzy zmieniają strony.

  NODI DI SANGUE: |
    Mini-kampania · Ravnica · Władza
    Cztery rody. Spadek do podziału. Jedno ciało w każdej sesji.
    Drużyna zostaje wciągnięta w sprawę wbrew sobie, a każdy chce ją wykorzystać.
    Finałowy zwrot odsłania, kto naprawdę zlecał komu pracę.

  RADICE DEL MORBO: |
    Mini-kampania · Forgotten Realms · Zaraza
    Wioska prosi o pomoc. To, co drużyna znajduje, nie jest potworem.
    Stwór jest tylko skutkiem, a przyczyna uśmiecha się pośród ludzi.
    Wiejski horror z finałem o dużym ładunku emocjonalnym.

  GIURAMENTO INFRANTO: |
    Mini-kampania · Dragonlance · Los
    Drużyna złożyła kiedyś przysięgę. Teraz ktoś chce zapłaty.
    Trzy sesje, by dotrzymać słowa, zdradzić je albo nadać obietnicy nowe znaczenie.
    Backstory w centrum, osobisty finał i żadnej czystej strony konfliktu.

  PROFEZIA DI CARTA: |
    Mini-kampania · Homebrew · Przepowiednia
    Przepowiednia jest fałszywa, ale ktoś zbudował na niej swoją władzę.
    Drużyna podąża za dawnymi inskrypcjami ku niewygodnej prawdzie.
    Warstwowa tajemnica z odkryciem, które przepisuje całą początkową tezę.

  POLVERE E SILENZIO: |
    Mini-kampania · Dark Sun · Przetrwanie
    Złoczyńca już wygrał. Misją jest uratować cokolwiek się da.
    Spalony świat, ograniczone zasoby i żaden wybawca nie nadchodzi.
    Trudne decyzje moralne i finał zależny od tego, co postanowisz ocalić.

  SETTIMANA DI VETRO: |
    Mini-kampania · Eberron · Paranoja
    Masz chronić kogoś przez tydzień. Jest czwartek. Trzy zamachy już nie wyszły.
    Czwarty nadejdzie od środka. Artefakt wie więcej, niż mówi.
    Rosnące napięcie, niepełne informacje i zaciskający się odliczacz.

  CERCHIO CHIUSO: |
    Mini-kampania · Ravenloft · Kult
    Kult oficjalnie nikogo nie krzywdzi. Byli członkowie jednak znikają.
    Drużyna infiltruje grupę i znajduje prawdę gorszą od podejrzeń.
    Warstwowa eskalacja, podwójne tożsamości i niemożliwe wybory na koniec.

  # ── DŁUGA KAMPANIA ───────────────────────────────────────────────────────────

  CORONA DI CENERE: |
    Długa kampania · Dragonlance · Klasyczne fantasy
    Korona powraca w chwili, gdy królestwo jest zbyt słabe, by unieść jej ciężar.
    Rody, zakony i weterani wojny roszczą sobie prawo do tego samego symbolu legitymizacji.
    Zdrajca nie czeka na koniec historii. Dorasta tuż obok drużyny.

  PATTO DELLE MAREE: |
    Długa kampania · Exandria · Przygoda morska
    Zerwane szlaki, wyspy pojawiające się i znikające, oraz przysięga wyryta pod powierzchnią morza.
    Każdy port otwiera inny rozdział: politykę, tajemnicę, wojnę albo kult.
    Wspólna przeszłość drużyny jest kluczem spinającym całą sagę.

  ARCHIVIO DEI SANTI: |
    Długa kampania · Eberron · Intryga polityczna
    Święte archiwum skrywa dowody zdolne przerysować granice całych narodów.
    Kościoły, gildie i akademie walczą o prawdę, lecz tylko jedna instytucja naprawdę chce ją pogrzebać.
    Kampania powolnych odkryć, kruchych sojuszy i szanowanej władzy, która gnije od środka.

  INVERNO SENZA EREDI: |
    Długa kampania · Ravenloft · Gotycki horror
    Dynastia wygasa, ale zamek nadal domaga się dziedzica.
    Każdy pretendent przynosi prawdę, której nie da się pogodzić z oficjalną historią domeny.
    Przepowiednia podtrzymująca królestwo jest fałszywa, a ktoś wie o tym od pokoleń.

  LEGGI DELLA POLVERE: |
    Długa kampania · Dark Sun · Przetrwanie
    Tego świata nie da się już ocalić. Trzeba przejść przez niego na tyle długo, by odkryć, co zasługuje na przetrwanie.
    Miasta-państwa upadają jedno po drugim, a każde zwycięstwo drużyny przychodzi dla kogoś za późno.
    Złoczyńca już wygrał; ten łuk opowiada o tym, co można jeszcze wyrwać ruinie.

  OSSA DELLA CITTA: |
    Długa kampania · Ravnica · Wojna frakcji
    Pod miastem trwa drugi konflikt, starszy i bardziej głodny niż ten na powierzchni.
    Gildie wierzą, że walczą o teraźniejszość, ale karmią coś znacznie dawniejszego.
    Artefakt, którego wszyscy pragną, nie jest bronią. To doradca łaknący imperium.

  ALTARE DELLA COMETA: |
    Długa kampania · Forgotten Realms · Podróż międzyplanarna
    Kometa wraca w niemożliwych odstępach i rozrywa niebo.
    Każdy kolejny rozdział prowadzi drużynę coraz dalej od świata, który znała.
    Główne odkrycie nie zagraża wyłącznie regionowi, lecz podważa samą naturę rzeczywistości.

  TRONO SOMMERSO: |
    Długa kampania · Wildemount · Wojna frakcji
    Królestwo utracone pod morzem wraca do centrum polityki powierzchni.
    Statki, szpiedzy i relikwie wciągają drużynę w wojnę, której żadna frakcja naprawdę nie rozumie.
    Antagonista wygląda na źródło chaosu, ale próbuje zatrzymać coś jeszcze gorszego.

  RE DEL VETRO: |
    Długa kampania · Kontynent autorski · Intryga polityczna
    Elegancki dwór przepisuje pamięć całego kontynentu z niemal baśniową gracją.
    Każdy sojusz zdobyty przez drużynę zostawia po sobie nową szczelinę w rzeczywistości.
    Pętla czasu nigdy nie jest oczywista; żyje w szczegółach, pomyłkach i twarzach, które pamiętają zbyt wiele.

  LANTERNE NELLA NEBBIA: |
    Długa kampania · Spelljammer · Przygoda morska
    Flotylla małych światów znika za mgłą, która nie należy do kosmosu.
    Drużyna ściga kogoś, kogo trzeba ocalić, lecz kto ma doskonałe powody, by nie wracać.
    Lżejszy ton, ale idealny grunt pod kosmiczną eskalację i późne objawienie.

  # ── EKSPLORACJA LOCHÓW ───────────────────────────────────────────────────────

  TOMBA RESPIRANTE: |
    Lochy · Forgotten Realms · Tajemnica
    Grobowiec, który nie powinien być pusty i wcale taki nie jest.
    Loch oddycha, rośnie i odpowiada na działania drużyny.
    Każda komnata skrywa objawienie. Ostatnie zmienia wszystko.

  PALUDE SENZA RITORNO: |
    Lochy · Homebrew · Horror
    Weszli, by rabować. Znaleźli coś, co nie powinno istnieć.
    Drużyna już nie żyje, tylko jeszcze o tym nie wie.
    Klaustrofobiczny horror z odkrywaniem prawdy poziom po poziomie.

  FUGA DAL PROFONDO: |
    Lochy · Dark Sun · Przetrwanie
    Stwory uciekają na powierzchnię przed czymś, co czai się niżej.
    Drużyna schodzi ku temu, przed czym wszyscy inni uciekają.
    Ograniczone zasoby, zdesperowane frakcje i drapieżnik o skali kataklizmu.

  SANTUARIO DEL PECCATO: |
    Lochy · Ravenloft · Instytucja
    Przeklęte sanktuarium zbudowane przez kościół, by ukryć prawdę.
    Zagrożeniem nie jest nieumarły, ale ten, kto go stworzył, i powód, dla którego to zrobił.
    Horror z mocnym śledczym rdzeniem i ciężkim moralnie finałem.

  FONDERIA SENZA PADRONE: |
    Lochy · Eberron · Arkana
    Porzucona arkaniczna odlewnia. Golemy wciąż pracują dla kogoś.
    Artefakt w centrum wie więcej, niż się wydaje i ma własny plan.
    Podziemny steampunk z unikalną mechaniką i zaskakującym finałowym odkryciem.

  SOGNO A LIVELLI: |
    Lochy · Exandria · Kosmos
    Loch nie jest miejscem. To sen boga, który jeszcze się nie obudził.
    Każdy poziom rządzi się innymi zasadami. Rzeczywistość można negocjować.
    Dla tych, którzy chcą dungeon crawla wymykającego się kategoriom.

  ABISSO NECESSARIO: |
    Lochy · Homebrew · Łowy
    Zeszli, by zabić potwora. Potwór próbuje zatrzymać coś jeszcze gorszego.
    Wewnętrzne frakcje ścierają się ze sobą, a objawienie odwraca sens całej misji.
    W tym lochu największe zagrożenie nie czeka na dnie, tylko po stronie tego, kto ich tu wysłał.

  LABIRINTO RISCRITTO: |
    Lochy · Feywild · Pętla
    Labirynt przepisuje się za każdym razem, gdy drużyna odpoczywa.
    Czas płynie tu inaczej, a ktoś umie to wykorzystać.
    Baśniowy i dezorientujący, z finałem wymagającym zrozumienia zasad miejsca.

  TANA DELL'ORIGINE: |
    Lochy · Dragonlance · Dziedzictwo
    Smocza jama jest pusta. Smoki uciekły, a drużyna dzieli pochodzenie z tym, co je wypędziło.
    Heroiczny loch, w którym tożsamość drużyny staje się głównym objawieniem finału.
    Dla tych, którzy chcą klasycznego crawla z osobistym, druzgocącym zwrotem.

  AVAMPOSTO CONTESO: |
    Lochy · Wildemount · Wojna
    Wojskowy posterunek runął pod powierzchnię. Ktoś przejął nad nim kontrolę.
    Na każdym poziomie walczą ze sobą frakcje, a drużyna staje się nieprzewidzianą zmienną.
    Sojusznik prowadzący ich do środka ma własne powody. Nie wszystkie pokrywają się z ich celami.
