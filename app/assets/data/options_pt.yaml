preset_descriptions:

  # ── ONE-SHOT ─────────────────────────────────────────────────────────────────

  NULLA NELLE TORRI: |
    One-Shot · Eberron · Noir
    Um artefacto roubado rasga um varco para o vazio — e algo atravessa.
    Corrida contra o tempo numa cidade que ainda não sabe que já está condenada.
    O grupo trabalha para alguém. Descobre tarde demais por quem.

  SPECCHI SENZA VITA: |
    One-Shot · Ravenloft · Horror
    Uma maldição que se espalha de porta em porta. O grupo já está infetado.
    Investigação tensa com um relógio interno e sem respostas fáceis.
    A reviravolta não vem de fora — vem do espelho.

  ORDINI SPEZZATI: |
    One-Shot · Wildemount · Guerra
    Uma ordem para executar. Um aliado que sorri demais.
    Infiltração numa zona de guerra com fações em colisão.
    Ritmo frenético, ambiguidade moral, um final que pesa.

  CENERI SENZA SPERANZA: |
    One-Shot · Dark Sun · Sobrevivência
    O vilão já venceu. O grupo chega às ruínas.
    Corrida contra o tempo num mundo queimado, sem salvadores.
    Sobreviver não chega — tens de escolher o que salvar.

  FIERA SOTTO PRESSIONE: |
    One-Shot · Ravnica · Intriga
    Trinta minutos para impedir algo numa feira apinhada.
    Três suspeitos, mil civis, zero autoridades disponíveis.
    O alvo não quer ser detido. Tem as suas boas razões.

  FUNERALE SBAGLIATO: |
    One-Shot · Forgotten Realms · Mistério
    Um funeral errado. Um corpo que não é o certo.
    Quem trocou o cadáver já sabe que o grupo está lá.
    O vilão não é o vilão que parece — e tem razão.

  OMBRA NELLA CACCIA: |
    One-Shot · Continente homebrew · Caça
    A caçada era simples. A criatura não era o que pensavam.
    Algo muito maior tem-nos empurrado na direção do grupo.
    Escolha final: combater a ameaça ou segui-la até à fonte.

  ECO DAL FUTURO: |
    One-Shot · Exandria · Loop temporal
    Um portal abre-se. Lá dentro, vem... o próprio grupo.
    Versões futuras, avisos impossíveis, um inimigo que sabe tudo.
    O círculo só se fecha se entenderes onde começou.

  LOCANDA AL CREPUSCOLO: |
    One-Shot · Feywild · Conto de fadas
    A última estalagem antes da fronteira. Um hóspede não sai.
    Horror claustrofóbico com revelação em camadas, sala a sala.
    O artefacto não é uma arma — é alguém que se lembra.

  ROTTE STELLARI: |
    One-Shot · Spelljammer · Espaço
    Um navio, uma tripulação improvável, uma entrega impossível.
    O alvo não quer ser encontrado — e tem as suas boas razões.
    Tom irónico e alta velocidade; caos cósmico garantido.

  # ── MINI-CAMPAIGN ────────────────────────────────────────────────────────────

  CICATRICI DI FERRO: |
    Mini-campanha · Wildemount · Guerra
    Uma guerra que acabou há dois anos. As cicatrizes não fecharam.
    O grupo segue vendettas que levam a ordens nunca dadas oficialmente.
    Cada sessão revela uma nova camada de quem mentiu e porquê.

  MARE CHE SCOMPARE: |
    Mini-campanha · Continente homebrew · Oceano
    Uma vila costeira desaparece dos mapas a cada trinta anos. É outra vez a hora.
    O grupo tem poucas sessões para perceber — e decidir se vale a pena impedir.
    Folclore, política local e uma revelação cosmológica no final.

  ARCHIVI IN FIAMME: |
    Mini-campanha · Eberron · Intriga
    Alguém está a queimar os arquivos arcanos de três cidades numa ordem precisa.
    As pistas levam a uma verdade que a guilda quer enterrar.
    Intriga académica, perseguições, aliados que trocam de lado.

  NODI DI SANGUE: |
    Mini-campanha · Ravnica · Poder
    Quatro famílias nobres. Uma herança disputada. Um corpo por sessão.
    O grupo é envolvido contra a sua vontade — e toda a gente quer usá-lo.
    Reviravolta final sobre quem, afinal, estava a contratar quem.

  RADICE DEL MORBO: |
    Mini-campanha · Forgotten Realms · Praga
    Uma aldeia pede ajuda. O que encontram não é um monstro.
    A criatura é a consequência — a causa sorri entre as pessoas.
    Horror rural com um final de forte impacto emocional.

  GIURAMENTO INFRANTO: |
    Mini-campanha · Dragonlance · Destino
    O grupo fez um juramento há anos. Alguém quer cobrar.
    Três sessões para honrar, trair ou reinterpretar uma promessa impossível.
    História de fundo no centro, clímax pessoal, sem lados limpos.

  PROFEZIA DI CARTA: |
    Mini-campanha · Continente homebrew · Profecia
    A profecia é falsa — mas alguém construiu poder em cima dela.
    O grupo segue inscrições antigas rumo a uma verdade desconfortável.
    Mistério em camadas com uma revelação que reescreve a premissa inicial.

  POLVERE E SILENZIO: |
    Mini-campanha · Dark Sun · Sobrevivência
    O vilão já venceu. A missão é salvar o que ainda pode ser salvo.
    Um mundo queimado, recursos limitados, nenhum salvador a caminho.
    Decisões morais difíceis e um final que depende do que escolheste.

  SETTIMANA DI VETRO: |
    Mini-campanha · Eberron · Paranoia
    Proteger alguém durante uma semana. É quinta-feira. Três atentados já falharam.
    O quarto vem de dentro. O artefacto sabe mais do que diz.
    Tensão a subir, informação parcial, uma contagem decrescente a apertar.

  CERCHIO CHIUSO: |
    Mini-campanha · Ravenloft · Culto
    Um culto não faz mal — oficialmente. Ex-membros desaparecem.
    O grupo infiltra-se e encontra uma verdade pior do que suspeitava.
    Escalada em camadas, identidades duplas, escolhas impossíveis no final.

  # ── CAMPANHA LONGA ───────────────────────────────────────────────────────────

  CORONA DI CENERE: |
    Campanha longa · Dragonlance · Fantasia clássica
    Uma coroa reaparece exatamente quando o reino está demasiado fraco para suportar o seu peso.
    Casas nobres, ordens cavaleirescas e veteranos de guerra reclamam o mesmo símbolo de legitimidade.
    O traidor não espera no fim da história; cresce ao lado do grupo.

  PATTO DELLE MAREE: |
    Campanha longa · Exandria · Aventura náutica
    Rotas quebradas, ilhas que desaparecem e um juramento gravado sob o mar.
    Cada porto abre um arco diferente: política, mistério, guerra ou intriga de culto.
    O passado partilhado do grupo é a chave que prende toda a saga.

  ARCHIVIO DEI SANTI: |
    Campanha longa · Eberron · Intriga política
    Um arquivo sagrado guarda provas capazes de redesenhar nações inteiras.
    Igrejas, guildas e academias parecem competir pela verdade, mas só uma instituição a quer mesmo enterrada.
    Campanha de progressão lenta com alianças frágeis, revelações em camadas e poder respeitável apodrecido.

  INVERNO SENZA EREDI: |
    Campanha longa · Ravenloft · Horror gótico
    Uma dinastia está a morrer, mas o castelo continua a exigir um herdeiro.
    Cada pretendente carrega uma verdade que contradiz a história oficial do domínio.
    A profecia que sustenta o reino é falsa, e alguém o sabe há gerações.

  LEGGI DELLA POLVERE: |
    Campanha longa · Dark Sun · Natureza selvagem
    O mundo não pode ser salvo; só pode ser atravessado tempo suficiente para decidir o que merece sobreviver.
    As cidades-estado caem uma a uma, e cada vitória chega tarde demais para alguém.
    O vilão já venceu, por isso o arco real é o que ainda se consegue arrancar às ruínas.

  OSSA DELLA CITTA: |
    Campanha longa · Ravnica · Guerra de facções
    Sob a cidade existe um segundo conflito, mais antigo e mais faminto do que o primeiro.
    As guildas acham que lutam pelo presente, mas estão a alimentar algo muito mais antigo.
    O artefacto que todos querem não é uma arma. É um conselheiro com apetite de império.

  ALTARE DELLA COMETA: |
    Campanha longa · Forgotten Realms · Viagem planar
    Um cometa que regressa rasga feridas no céu num ciclo impossível.
    Cada arco empurra o grupo mais longe do mundo que pensava compreender.
    A revelação central não ameaça apenas a região; desafia a própria natureza da realidade.

  TRONO SOMMERSO: |
    Campanha longa · Wildemount · Guerra de facções
    Um reino afogado regressa ao centro da política da superfície.
    Navios, espiões e relíquias arrastam o grupo para uma guerra que nenhuma fação entende verdadeiramente.
    O antagonista aparente parece o motor do caos, mas na verdade tenta travar algo pior.

  RE DEL VETRO: |
    Campanha longa · Continente homebrew · Intriga política
    Uma corte elegante reescreve a memória do continente com graça quase de conto de fadas.
    Cada aliança que o grupo garante deixa para trás uma nova fratura na realidade.
    O loop temporal nunca é óbvio; vive nos detalhes, nos erros e nas faces que se lembram demais.

  LANTERNE NELLA NEBBIA: |
    Campanha longa · Spelljammer · Aventura náutica
    Uma flotilha de mundos menores desaparece atrás de um nevoeiro que não pertence ao espaço.
    O grupo persegue alguém que precisa de ser salvo e tem excelentes razões para não voltar.
    Tom mais leve, mas ideal para escalada cósmica e revelação tardia.

  # ── MASMORRA ────────────────────────────────────────────────────────────────

  TOMBA RESPIRANTE: |
    Masmorra · Forgotten Realms · Mistério
    Uma tumba que não devia estar vazia — e não está.
    A masmorra respira, cresce, reage às ações do grupo.
    Cada sala esconde uma revelação. A última muda tudo.

  PALUDE SENZA RITORNO: |
    Masmorra · Continente homebrew · Horror
    Entraram para saquear. Encontraram algo que não devia existir.
    O grupo já está morto — ainda não o sabe.
    Horror claustrofóbico com revelação em camadas, nível a nível.

  FUGA DAL PROFONDO: |
    Masmorra · Dark Sun · Sobrevivência
    Criaturas estão a fugir para a superfície de algo lá em baixo.
    O grupo desce na direção do que todos os outros estão a evitar.
    Recursos limitados, fações desesperadas, um predador de escala cataclísmica.

  SANTUARIO DEL PECCATO: |
    Masmorra · Ravenloft · Instituição
    Um santuário amaldiçoado — construído pela igreja para esconder uma verdade.
    A ameaça não são os mortos-vivos: é quem os criou e porquê.
    Horror com forte componente investigativa e um final moralmente pesado.

  FONDERIA SENZA PADRONE: |
    Masmorra · Eberron · Arcano
    Uma fundição arcana abandonada. Os golems ainda trabalham — para alguém.
    O artefacto no centro sabe mais do que parece — e tem um plano.
    Steampunk subterrâneo com mecânicas únicas e uma revelação final surpreendente.

  SOGNO A LIVELLI: |
    Masmorra · Exandria · Cósmico
    A masmorra não é um lugar — é o sonho de um deus que ainda não acordou.
    Cada nível segue regras diferentes. A realidade é negociável.
    Para quem quer uma exploração de masmorra que foge às categorias.

  ABISSO NECESSARIO: |
    Masmorra · Continente homebrew · Caça
    Desceram para matar o monstro. O monstro está a tentar travar algo pior.
    Fações internas em conflito, revelação que vira a missão inicial.
    Uma masmorra onde a maior ameaça não está no fundo — é quem os enviou.

  LABIRINTO RISCRITTO: |
    Masmorra · Feywild · Loop temporal
    Um labirinto que se reescreve sempre que o grupo descansa.
    O tempo flui de forma diferente aqui — e alguém tira proveito disso.
    Feérico e desorientador, com um final que exige compreender as regras.

  TANA DELL'ORIGINE: |
    Masmorra · Dragonlance · Legado
    A toca do dragão está vazia. Os dragões fugiram — e o grupo partilha a mesma origem de seja o que for que os expulsou.
    Masmorra heróica com a identidade do grupo como revelação central do clímax.
    Para quem quer uma exploração clássica de masmorra com uma reviravolta pessoal devastadora.

  AVAMPOSTO CONTESO: |
    Masmorra · Wildemount · Guerra
    Um avanposto militar caído abaixo da superfície. Alguém tomou o controlo.
    Fações a combater em todos os níveis — o grupo é a variável inesperada.
    O aliado que os guia para dentro tem as suas razões. Nem todas alinham com as deles.
