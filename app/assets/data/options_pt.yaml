setting_descriptions:
  Forgotten Realms: Mundo clássico de alta fantasia, rico em reinos, magia antiga e aventuras heróicas.
  Eberron: Ambientação pulp-noir com tecnologia arcana, intriga política e mistérios metropolitanos.
  Ravenloft: Domínio gótico de horror, onde a névoa esconde maldições e lordes sombrios.
  Exandria: Cenário épico e moderno, com grandes conflitos, divindades ativas e regiões muito diversas.
  Continente homebrew: Mundo original criado na mesa, flexível no tom, história e regras caseiras.
  Dragonlance: Fantasia heróica moldada pela guerra entre dragões, ordens cavaleirescas e profecias.
  Ravnica: Megalópole planar dominada por guildas rivais, perfeita para tramas urbanas e lutas de poder.
  Spelljammer: Viagem cósmica entre esferas cristalinas, navios voadores e equipas mistas em aventuras de fantasia espacial.
  Theros: Ambientação greco-mitológica com deuses ativos, oráculos e monstros lendários ligados ao destino dos heróis.
  Dark Sun: Mundo desértico pós-apocalíptico, duro e distópico, onde a magia consome recursos e a sobrevivência é central.
  Wildemount: Cenário político e bélico de Exandria, ideal para campanhas de conflito entre nações, intriga e frentes de guerra.
  Feywild: Plano feérico, espelho distorcido do mundo material, povoado por criaturas mágicas, reinos encantados e estranhezas imprevisíveis.
  Planescape: Encruzilhada cósmica dominada por filosofias em guerra, onde cada fação reivindica a verdadeira Natureza da Realidade através de planos infinitos.
  Underdark: Mundo subterrâneo de escuridão sem fim, tecido por túneis sem luz, fações implacáveis e segredos antigos enterrados nas profundezas.
  Fronteira: Terras selvagens nas margens da civilização, onde a lei é incerta, as comunidades estão isoladas e o perigo é constante.
  Shadowfell: Reflexo sombrio do mundo material, saturado de decadência, emoções abafadas e mortos que persistem.
  Radiant Citadel: Encruzilhada luminosa no Plano Etéreo, ligando culturas distantes por portais mágicos e tradições vivas.
  Avernus: Primeira camada dos Nove Infernos, um campo de batalha queimado pela guerra infernal, motores de ferro e barganhas desesperadas.
  Sigil: Cidade das Portas no centro dos planos, onde fações, portais e ideias perigosas moldam cada rua.
  Greyhawk: Mundo clássico de fantasia old-school, com reinos rivais, masmorras profundas e aventura heróica mais contida.
  Ghosts of Saltmarsh Coast: Fronteira costeira agreste de vilas piscatórias, enseadas escondidas, contrabandistas e ameaças vindas do mar.

