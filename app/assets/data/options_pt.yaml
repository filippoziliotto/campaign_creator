twists:
  - Sem reviravolta
  - A profecia é falsa
  - O aliado de confiança é o traidor
  - O antagonista está a tentar evitar uma catástrofe pior
  - O grupo partilha uma origem esquecida
  - O artefacto principal é senciente e manipulador
  - A masmorra é um organismo vivo
  - O alvo da missão não quer ser salvo
  - A pessoa desaparecida orquestrou o próprio desaparecimento
  - A verdadeira ameaça é uma instituição benevolente (igreja, guilda, academia)
  - O mundo está preso num subtil loop temporal
  - As PJs já estão mortas e não o sabem
  - O vilão já venceu e a missão é controlo de danos
  - O grupo está, sem o saber, ao serviço do vilão
  - Os monstros estão a fugir de um predador de escala cataclísmica
  - Toda a região é uma simulação mágica ou o sonho de um deus adormecido
  - A cura para a praga exige o sacrifício da pessoa que a encomendou
  - A facção inimiga é composta por sobreviventes futuros do fracasso do grupo
  - O apocalipse já aconteceu; o mundo vive dentro do feitiço de reparação
  - A profecia está correta, mas refere-se aos vilões, não aos heróis
  - A Morte desapareceu e outra coisa está a fazer o trabalho, muito mal
  - Um deus está a mentir sobre o que quer
  - A prisão foi construída para manter algo lá fora
  - As memórias do grupo foram alteradas por uma razão
  - O patrono está morto desde antes do início da missão

