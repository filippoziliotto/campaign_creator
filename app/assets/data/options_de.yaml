twists:
  - Kein Twist
  - Die Prophezeiung ist falsch
  - Der vertraute Verbündete ist der Verräter
  - Der Antagonist versucht, eine schlimmere Katastrophe zu verhindern
  - Die Gruppe teilt einen vergessenen Ursprung
  - Das zentrale Artefakt ist empfindungsfähig und manipulativ
  - Die wahre Bedrohung ist eine wohlwollende Institution (Kirche, Gilde, Akademie)
  - Die Welt steckt in einer subtilen Zeitschleife fest
  - Der Dungeon ist ein lebender Organismus
  - Das Missionsziel will nicht gerettet werden
  - Die SC sind bereits tot und wissen es nicht
  - Der Bösewicht hat bereits gewonnen, und die Mission dient nur noch der Schadensbegrenzung
  - Die Gruppe dient dem Bösewicht, ohne es zu wissen
  - Die Monster fliehen vor einem Raubtier kataklysmischen Ausmaßes
  - Die gesamte Region ist eine magische Simulation oder der Traum eines schlafenden Gottes
  - Die Heilung der Seuche erfordert das Opfer der Person, die den Auftrag gegeben hat
  - Die feindliche Fraktion besteht aus zukünftigen Überlebenden des Scheiterns der Gruppe
  - Die Apokalypse hat bereits stattgefunden; die Welt lebt innerhalb des Reparaturzaubers
  - Die Prophezeiung ist korrekt, aber sie bezieht sich auf die Bösewichte, nicht auf die Helden
  - Der Tod ist verschwunden, und etwas anderes erledigt seinen Job schlecht
  - Ein Gott lügt über das, was er will
  - Das Gefängnis wurde gebaut, um etwas draußen zu halten
  - Die Erinnerungen der Gruppe wurden aus einem Grund verändert
  - Der Auftraggeber ist schon vor Beginn der Mission gestorben
  - Die vermisste Person hat ihr eigenes Verschwinden inszeniert


