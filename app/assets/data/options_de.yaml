setting_descriptions:
  Forgotten Realms: Klassische High-Fantasy-Welt voller Reiche, uralter Magie und heroischer Abenteuer.
  Eberron: Pulp-Noir-Setting mit arkaner Technologie, politischer Intrige und urbanen Geheimnissen.
  Ravenloft: Gothische Horror-Domäne, in der der Nebel Flüche und dunkle Herrscher verbirgt.
  Exandria: Episches, modernes Szenario mit großen Konflikten, aktiven Göttern und sehr unterschiedlichen Regionen.
  Eigenkontinent: Am Spieltisch erschaffene Originalwelt mit flexiblem Ton, eigener Geschichte und Hausregeln.
  Dragonlance: Heroische Fantasy, geprägt vom Krieg zwischen Drachen, Ritterorden und Prophezeiungen.
  Ravnica: Planare Megastadt rivalisierender Gilden, ideal für urbane Plots und Machtkämpfe.
  Spelljammer: Kosmische Reise zwischen Kristallsphären, fliegenden Schiffen und gemischten Crews in Space-Fantasy-Abenteuern.
  Theros: Griechisch-mythologisches Setting mit aktiven Göttern, Orakeln und legendären Monstern, die an das Schicksal der Helden gebunden sind.
  Dark Sun: Postapokalyptische Wüstenwelt, hart und dystopisch, in der Magie Ressourcen verzehrt und Überleben zentral ist.
  Wildemount: Politisch und kriegerisch geprägter Teil Exandrias, ideal für nationale Konflikte, Intrigen und Kriegsfronten.
  Feywild: Feenebene als verzerrter Spiegel der materiellen Welt, bevölkert von magischen Wesen, verzauberten Reichen und unberechenbarer Fremdartigkeit.
  Planescape: Kosmischer Kreuzungspunkt widerstreitender Philosophien, an dem jede Fraktion die wahre Natur der Realität über unendliche Ebenen beansprucht.
  Underdark: Endlose unterirdische Welt der Dunkelheit, durchzogen von lichtlosen Tunneln, erbarmungslosen Fraktionen und uralten Geheimnissen tief unten.
  Grenzland: Wilde Länder am Rand der Zivilisation, wo Recht unsicher ist, Siedlungen isoliert sind und Gefahr allgegenwärtig bleibt.
  Shadowfell: Düsteres Spiegelbild der materiellen Welt, geprägt von Verfall, gedämpften Gefühlen und rastlosen Toten.
  Radiant Citadel: Leuchtender Knotenpunkt in der Ätherebene, verbunden mit fernen Zivilisationen durch magische Tore und lebendige Kulturen.
  Avernus: Erste Schicht der Neun Höllen, ein verbranntes Kriegsland aus infernalem Eisen, brutalen Pakten und verzweifeltem Überleben.
  Sigil: Stadt der Türen im Zentrum der Ebenen, wo Fraktionen, Portale und gefährliche Ideen jede Straße prägen.
  Greyhawk: Klassische Old-School-Fantasy-Welt voller rivalisierender Reiche, tiefer Dungeons und bodenständigen Heldentums.
  Ghosts of Saltmarsh Coast: Raue Küstenfrontier aus Fischerorten, verborgenen Buchten, Schmugglern und Bedrohungen aus dem Meer.

