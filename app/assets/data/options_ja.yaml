  LANTERNE NELLA NEBBIA: 霧の中の灯
  TOMBA RESPIRANTE: 呼吸する墓
  PALUDE SENZA RITORNO: 帰らずの沼
  FUGA DAL PROFONDO: 深淵からの逃走
  SANTUARIO DEL PECCATO: 罪の聖域
  FONDERIA SENZA PADRONE: 主なき鋳造所
  SOGNO A LIVELLI: 層を成す夢
