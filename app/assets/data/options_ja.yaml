  SETTIMANA DI VETRO: ガラスの一週間
  CERCHIO CHIUSO: 閉じた輪
  CORONA DI CENERE: 灰の冠
  PATTO DELLE MAREE: 潮の盟約
  ARCHIVIO DEI SANTI: 聖者の記録庫
  INVERNO SENZA EREDI: 後継なき冬
  LEGGI DELLA POLVERE: 塵の法
  OSSA DELLA CITTA: 都市の骨
  ALTARE DELLA COMETA: 彗星の祭壇
  TRONO SOMMERSO: 沈んだ玉座
