twists:
  - どんでん返しなし
  - 予言は偽りだった
  - 信頼していた味方こそ裏切り者
  - 敵役はさらに大きな災厄を防ごうとしている
  - パーティには忘れられた共通の起源がある
  - 主たるアーティファクトは意思を持ち、操っている
  - ダンジョンそのものが生きている
  - 任務の対象は救われることを望んでいない
  - 失踪者は自ら失踪を仕組んでいた
  - 真の脅威は善良に見える組織だ（教会、ギルド、学院）
  - 世界は目立たない時間ループに囚われている
  - PCたちはすでに死んでいるが、それを知らない
  - 悪役はすでに勝っており、任務は被害抑制に過ぎない
  - パーティは知らぬ間に悪役に仕えている
  - 怪物たちは破滅級の捕食者から逃げている
  - 地域全体が魔法のシミュレーションか眠れる神の夢である
  - 疫病の治療には依頼人の犠牲が必要となる
  - 敵対勢力はパーティ敗北後の未来の生存者で構成されている
  - 終末はすでに起きており、世界は修復呪文の中で生きている
  - 予言は正しいが、英雄ではなく悪役を指している
  - 死そのものが失踪し、別の何かが下手に代役を務めている
  - 神は自らの望みについて嘘をついている
  - その牢獄は中に閉じ込めるためでなく外を防ぐために造られた
  - パーティの記憶は理由があって改竄されている
  - パトロンは任務開始前からすでに死んでいた

