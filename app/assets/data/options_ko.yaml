setting_descriptions:
  Forgotten Realms: 왕국, 고대 마법, 영웅적인 모험으로 가득한 정통 하이 판타지 세계.
  Eberron: 비전 기술, 정치적 음모, 대도시의 미스터리가 얽힌 펄프 느와르 세계.
  Ravenloft: 안개가 저주와 어둠의 군주를 감추는 고딕 호러의 영역.
  Exandria: 거대한 갈등, 활동하는 신들, 매우 다양한 지역을 품은 현대적이고 장대한 세계.
  Homebrew continent: 테이블에서 직접 만든 오리지널 세계로, 분위기, 역사, 하우스룰을 유연하게 조정할 수 있다.
  Dragonlance: 용들의 전쟁, 기사단, 예언으로 형성된 영웅적 판타지.
  Ravnica: 경쟁하는 길드가 지배하는 차원 대도시로, 도시 음모와 권력 투쟁에 완벽하다.
  Spelljammer: 크리스털 구체 사이를 비행선과 혼성 승무원으로 항해하는 우주 판타지 모험.
  Theros: 영웅의 운명과 얽힌 신들, 신탁, 전설적 괴물들이 살아 있는 그리스 신화풍 세계.
  Dark Sun: 마법이 자원을 소모하고 생존 자체가 핵심이 되는, 혹독하고 디스토피아적인 종말 이후 사막 세계.
  Wildemount: 국가 간 갈등, 음모, 전선을 다루는 캠페인에 알맞은 Exandria의 정치적이고 전쟁적인 무대.
  Feywild: 마법 생물, 마법 어린 영역, 예측할 수 없는 기이함으로 가득한 물질계의 뒤틀린 거울 같은 요정계.
  Planescape: 모든 세력이 무한한 차원에 걸쳐 현실의 진정한 본질을 주장하는, 철학이 충돌하는 우주의 교차로.
  Underdark: 빛 없는 터널, 잔혹한 세력, 깊은 곳에 묻힌 고대 비밀이 이어지는 끝없는 지하 어둠의 세계.
  Frontier: 문명의 가장자리에 놓인 황야로, 법은 불확실하고 공동체는 고립되어 있으며 위험이 끊이지 않는다.
  Shadowfell: 쇠퇴, 무뎌진 감정, 떠도는 망자에 스며든 물질계의 음울한 반영 세계.
  Radiant Citadel: 마법 관문과 살아 있는 전통을 통해 먼 문화를 잇는 에테르계의 빛나는 교차 도시.
  Avernus: 아홉 지옥의 첫 번째 층으로, 지옥 전쟁, 철제 전쟁 기계, 절박한 거래가 뒤엉킨 불타는 전장.
  Sigil: 차원의 중심에 자리한 문들의 도시로, 세력, 포털, 위험한 사상이 모든 거리를 규정한다.
  Greyhawk: 경쟁하는 왕국, 깊은 던전, 현실감 있는 영웅 모험이 살아 있는 고전적인 올드스쿨 판타지 세계.
  Ghosts of Saltmarsh Coast: 어촌 마을, 숨겨진 만, 밀수업자, 바다에서 떠오르는 위협이 얽힌 거친 해안 변경 지대.

