twists:
  - 반전 없음
  - 예언은 거짓이었다
  - 믿었던 아군이야말로 배신자다
  - 적대자는 더 큰 재앙을 막으려 하고 있다
  - 파티에게는 잊힌 공통의 기원이 있다
  - 핵심 유물은 의식을 지녔고 조종하고 있다
  - 던전 자체가 살아 있다
  - 임무의 대상은 구원받기를 원하지 않는다
  - 실종자는 스스로 실종을 꾸몄다
  - 진짜 위협은 선의로 보이는 조직이다(교회, 길드, 아카데미)
  - 세계는 눈에 띄지 않는 시간 루프에 갇혀 있다
  - PC들은 이미 죽었지만 그 사실을 모른다
  - 악당은 이미 승리했고 임무는 피해를 줄이는 것뿐이다
  - 파티는 자신도 모르게 악당을 섬기고 있다
  - 괴물들은 파멸급 포식자에게서 도망치고 있다
  - 지역 전체가 마법적 시뮬레이션이거나 잠든 신의 꿈이다
  - 역병을 치료하려면 의뢰인의 희생이 필요하다
  - 적대 세력은 파티 패배 이후 미래의 생존자들로 이루어져 있다
  - 종말은 이미 일어났고 세계는 복구 주문 속에서 살아가고 있다
  - 예언은 맞지만 영웅이 아니라 악당을 가리킨다
  - 죽음 그 자체가 사라졌고 다른 무언가가 서투르게 그 자리를 대신하고 있다
  - 신은 자신의 진정한 뜻에 대해 거짓말하고 있다
  - 그 감옥은 안에 가두기 위한 것이 아니라 밖을 막기 위해 만들어졌다
  - 파티의 기억은 이유가 있어 조작되었다
  - 후원자는 임무가 시작되기 전부터 이미 죽어 있었다

