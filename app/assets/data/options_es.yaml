twists:
- Sin giro
- La profecía es falsa
- El aliado de confianza es el traidor
- El antagonista intenta evitar una catástrofe peor
- El grupo comparte un origen olvidado
- El artefacto principal es consciente y manipulador
- La verdadera amenaza es una institución benévola (iglesia, gremio, academia)
- El mundo está atrapado en un sutil bucle temporal
- La mazmorra es un organismo viviente
- El objetivo de la misión no quiere ser rescatado
- Los PJ ya están muertos y no lo saben
- El villano ya ha ganado y la misión consiste en limitar los daños
- El grupo sirve al villano sin saberlo
- Los monstruos huyen de un depredador de escala cataclísmica
- Toda la región es una simulación mágica o el sueño de un dios dormido
- La cura de la plaga exige el sacrificio de la persona que la encargó
