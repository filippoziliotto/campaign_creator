setting_descriptions:
  Forgotten Realms: Mundo clásico de fantasía heroica, lleno de reinos, magia antigua y aventuras legendarias.
  Eberron: Ambientación pulp-noir con tecnología arcana, intriga política y misterios metropolitanos.
  Ravenloft: Dominio gótico del horror, donde la niebla oculta maldiciones y señores oscuros.
  Exandria: Escenario épico y moderno, con grandes conflictos, dioses activos y regiones muy distintas.
  Continente casero: Mundo original creado en la mesa, flexible en tono, historia y reglas personalizadas.
  Dragonlance: Fantasía heroica marcada por la guerra entre dragones, órdenes caballerescas y profecías.
  Ravnica: Megalópolis planar dominada por gremios rivales, perfecta para tramas urbanas y luchas de poder.
  Spelljammer: Viaje cósmico entre esferas cristalinas, naves voladoras y tripulaciones mixtas en aventuras de fantasía espacial.
  Theros: Ambientación grecomitológica con dioses activos, oráculos y monstruos legendarios ligados al destino de los héroes.
  Dark Sun: Mundo desértico postapocalíptico, duro y distópico, donde la magia consume recursos y la supervivencia es central.
  Wildemount: Escenario político y bélico de Exandria, ideal para campañas de conflicto entre naciones, intrigas y frentes
    de guerra.
  Feywild: Plano feérico, reflejo distorsionado del mundo material, poblado de criaturas mágicas, reinos encantados y rarezas
    imprevisibles.
  Planescape: Cruce de caminos cósmico dominado por filosofías en guerra, donde cada facción reclama la verdadera naturaleza
    de la realidad.
  Underdark: Mundo subterráneo de oscuridad infinita, recorrido por túneles sin luz, facciones despiadadas y secretos antiguos.
  Frontera: Tierras salvajes en los límites de la civilización, donde la ley es incierta y el peligro es una constante.
