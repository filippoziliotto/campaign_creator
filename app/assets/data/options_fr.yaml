setting_descriptions:
  Forgotten Realms: Monde classique de fantasy héroïque, riche en royaumes, magie ancienne et aventures légendaires.
  Eberron: Univers pulp-noir avec technologie arcanique, intrigue politique et mystères métropolitains.
  Ravenloft: Domaine gothique de l’horreur, où la brume cache malédictions et seigneurs obscurs.
  Exandria: Cadre épique et moderne, avec de grands conflits, des divinités actives et des régions très diverses.
  Continent maison: Monde original créé à la table, flexible en ton, histoire et règles maison.
  Dragonlance: Fantasy héroïque façonnée par la guerre entre dragons, ordres chevaleresques et prophéties.
  Ravnica: Mégalopole planaire dominée par des guildes rivales, parfaite pour intrigues urbaines et luttes de pouvoir.
  Spelljammer: Voyage cosmique entre sphères cristallines, vaisseaux volants et équipages hétéroclites dans des aventures
    de fantasy spatiale.
  Theros: Cadre gréco-mythologique avec dieux actifs, oracles et monstres légendaires liés au destin des héros.
  Dark Sun: Monde désertique postapocalyptique, dur et dystopique, où la magie consume les ressources et où survivre est central.
  Wildemount: Cadre politique et guerrier d’Exandria, idéal pour des campagnes de conflit entre nations, d’intrigue et de
    fronts de guerre.
  Feywild: Plan féerique, miroir déformé du monde matériel, peuplé de créatures magiques, royaumes enchantés et étrangetés
    imprévisibles.
  Planescape: Carrefour cosmique dominé par des philosophies en guerre, où chaque faction revendique la vraie nature de la
    réalité.
  Underdark: Monde souterrain d’obscurité infinie, parcouru de tunnels sans lumière, de factions impitoyables et de secrets
    anciens.
  Frontière: Terres sauvages aux confins de la civilisation, où la loi est incertaine et le danger permanent.
  Shadowfell: Reflet funèbre du monde matériel, saturé de décrépitude, d’émotions étouffées et d’âmes qui refusent de partir.
  Radiant Citadel: Carrefour lumineux du Plan Éthéré, relié à des civilisations lointaines par des portails magiques et des cultures vivantes.
  Avernus: Première strate des Neuf Enfers, champ de guerre calciné entre machines infernales, pactes cruels et survie désespérée.
  Sigil: Cité des Portes au cœur des plans, où factions, portails et idées dangereuses façonnent chaque rue.
  Greyhawk: Monde classique de fantasy old-school, peuplé de royaumes rivaux, de donjons profonds et d’un héroïsme plus terre-à-terre.
  Ghosts of Saltmarsh Coast: Frontière côtière rude de villages de pêcheurs, criques cachées, contrebandiers et menaces surgies de la mer.
