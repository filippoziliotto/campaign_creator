name: campaign_creator_flutter
description: "Campaign Forge — Campaign prompt creator by FZ Labs."
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  animations: ^2.0.11
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.20.0
  share_plus: ^12.0.1
  yaml: ^3.1.2
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  country_flags: ^4.1.2
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  in_app_review: ^2.0.9
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.0
  audioplayers: ^6.1.0
  font_awesome_flutter: ^11.0.0
  flutter_emoji: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/entry_cards/
    - assets/background/parchment.png
    - assets/icon/
    - assets/google_fonts/
    - assets/audio/
    - assets/data/options.yaml
    - assets/data/options_it.yaml
    - assets/data/options_en.yaml
    - assets/data/options_es.yaml
    - assets/data/options_fr.yaml
    - assets/data/options_de.yaml
    - assets/data/options_pt.yaml
    - assets/data/options_pl.yaml
    - assets/data/options_ja.yaml
    - assets/templates/prompt_template.md
    - assets/templates/prompt_template_it.md
    - assets/templates/prompt_template_en.md
    - assets/templates/prompt_template_es.md
    - assets/templates/prompt_template_fr.md
    - assets/templates/prompt_template_de.md
    - assets/templates/prompt_template_pt.md
    - assets/templates/prompt_template_pl.md
    - assets/templates/prompt_template_ja.md
    - assets/templates/prompt_template_one_shot.md
    - assets/templates/prompt_template_one_shot_it.md
    - assets/templates/prompt_template_one_shot_en.md
    - assets/templates/prompt_template_one_shot_es.md
    - assets/templates/prompt_template_one_shot_fr.md
    - assets/templates/prompt_template_one_shot_de.md
    - assets/templates/prompt_template_one_shot_pt.md
    - assets/templates/prompt_template_one_shot_pl.md
    - assets/templates/prompt_template_one_shot_ja.md
    - assets/templates/prompt_template_mini_campaign.md
    - assets/templates/prompt_template_mini_campaign_it.md
    - assets/templates/prompt_template_mini_campaign_en.md
    - assets/templates/prompt_template_mini_campaign_es.md
    - assets/templates/prompt_template_mini_campaign_fr.md
    - assets/templates/prompt_template_mini_campaign_de.md
    - assets/templates/prompt_template_mini_campaign_pt.md
    - assets/templates/prompt_template_mini_campaign_pl.md
    - assets/templates/prompt_template_mini_campaign_ja.md
    - assets/templates/prompt_template_long_campaign.md
    - assets/templates/prompt_template_long_campaign_it.md
    - assets/templates/prompt_template_long_campaign_en.md
    - assets/templates/prompt_template_long_campaign_es.md
    - assets/templates/prompt_template_long_campaign_fr.md
    - assets/templates/prompt_template_long_campaign_de.md
    - assets/templates/prompt_template_long_campaign_pt.md
    - assets/templates/prompt_template_long_campaign_pl.md
    - assets/templates/prompt_template_long_campaign_ja.md
    - assets/templates/prompt_template_dungeon_exploration.md
    - assets/templates/prompt_template_dungeon_exploration_it.md
    - assets/templates/prompt_template_dungeon_exploration_en.md
    - assets/templates/prompt_template_dungeon_exploration_es.md
    - assets/templates/prompt_template_dungeon_exploration_fr.md
    - assets/templates/prompt_template_dungeon_exploration_de.md
    - assets/templates/prompt_template_dungeon_exploration_pt.md
    - assets/templates/prompt_template_dungeon_exploration_pl.md
    - assets/templates/prompt_template_dungeon_exploration_ja.md

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0E0A08"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#0E0A08"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0E0A08"
    image: assets/icon/app_icon.png
  ios: true
  android: true
